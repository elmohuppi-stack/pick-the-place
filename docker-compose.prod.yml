services:
  app:
    build: .
    container_name: pick-the-place
    ports:
      - "127.0.0.1:${WEB_PORT:-3091}:3000"
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - DATABASE_URL=file:./data/prod.db
    volumes:
      - data:/app/data
    restart: unless-stopped

volumes:
  data:
